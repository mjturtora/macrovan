name: Build Cross-Platform Executables

on:
  workflow_dispatch:

jobs:
  # --- MAC INTEL BUILD JOB ---
  build-mac-intel:
    runs-on: macos-15-intel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: poetry install --no-root

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: DIAGNOSTIC & COMPILE (MAC INTEL)
        run: |
          echo "--- ENTERING APP DIRECTORY ---"
          cd app
          echo "Current Directory: $(pwd)"
          echo "--- STARTING PYINSTALLER ---"
          poetry run pyinstaller --onefile --name MacroVan \
          --paths . \
          --hidden-import utils \
          --hidden-import voter_data_automation \
          --hidden-import voter_data_downloader \
          --hidden-import van_file_manager \
          --hidden-import auth \
          --hidden-import printing_steps \
          --collect-submodules selenium \
          --add-data "macrovan_config.json:." \
          macrovat.py

      - name: COMPRESS ARTIFACT (MAC INTEL)
        run: |
          cd app/dist
          zip MacroVan-MacOS-Intel.zip MacroVan

      - name: Upload Mac Intel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroVan-MacOS-Intel
          path: app/dist/MacroVan-MacOS-Intel.zip

  # --- WINDOWS BUILD JOB ---
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          (Invoke-WebRequest -Uri https://install.python-poetry.org -UseBasicParsing).Content | python -
          echo "$env:USERPROFILE\AppData\Roaming\Python\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Dependencies
        run: poetry install --no-root

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: DIAGNOSTIC & COMPILE (WINDOWS)
        run: |
          Write-Host "--- ENTERING APP DIRECTORY ---"
          cd app
          Write-Host "Current Directory: $((Get-Location).Path)"
          Write-Host "Files in Directory:"
          Get-ChildItem
          Write-Host "--- STARTING PYINSTALLER ---"
          poetry run pyinstaller --onefile --name MacroVan `
          --paths . `
          --hidden-import utils `
          --hidden-import voter_data_automation `
          --collect-submodules selenium `
          --add-data "macrovan_config.json;." `
          macrovat.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroVan-Windows
          path: app\dist\MacroVan.exe
